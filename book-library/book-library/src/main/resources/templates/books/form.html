<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${mode == 'edit'} ? 'Edit book' : 'Add new book'">Add book</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">BL</span>
    <div>
      <h1>Book Library</h1>
      <p class="sub">Spring Boot MVC + REST — SCSJ4383 Assignment 2</p>
    </div>
  </div>
  <nav>
    <a class="nav-link" th:href="@{/books}">Browse</a>
    <a class="nav-link" th:href="@{/books/new}">Add book</a>
    <a class="nav-link" th:href="@{/api/books}" target="_blank">REST: /api/books</a>
  </nav>
</header>

<main class="container narrow">

  <section class="card">
    <h2 th:text="${mode == 'edit'} ? 'Edit book' : 'Add a new book'">Add a new book</h2>
    <p class="muted" th:if="${mode == 'create'}">
      Fields marked <span class="req">*</span> are required.
    </p>

    <form th:action="${mode == 'edit'} ? @{/books/{id}(id=${book.id})} : @{/books}"
          th:object="${book}"
          method="post"
          class="stacked-form">

      <div class="field">
        <label for="title">Title <span class="req">*</span></label>
        <input id="title" type="text" th:field="*{title}" placeholder="e.g. Clean Code" />
        <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
      </div>

      <div class="field">
        <label for="author">Author <span class="req">*</span></label>
        <input id="author" type="text" th:field="*{author}" placeholder="e.g. Robert C. Martin" />
        <p class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></p>
      </div>

      <div class="row">
        <div class="field">
          <label for="genre">Genre</label>
          <input id="genre" type="text" th:field="*{genre}" placeholder="Programming, Fiction…" />
          <p class="field-error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></p>
        </div>

        <div class="field">
          <label for="year">Year</label>
          <input id="year" type="number" min="0" th:field="*{year}" />
          <p class="field-error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></p>
        </div>
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" th:field="*{available}" />
          Currently available
        </label>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          <span th:text="${mode == 'edit'} ? 'Save changes' : 'Add book'">Add book</span>
        </button>
        <a class="btn btn-ghost" th:href="@{/books}">Cancel</a>
      </div>
    </form>
  </section>

</main>

<footer class="footer">
  <span>Spring Boot 3 · Spring MVC · Thymeleaf · Spring Data JPA · H2</span>
</footer>

</body>
</html>
