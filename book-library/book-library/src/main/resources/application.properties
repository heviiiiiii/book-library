# ============================================================
# SCSJ4383 Assignment 2 — Book Library
# Spring Boot configuration
# ============================================================

spring.application.name=book-library
server.port=8081

# ---- Database (in-memory H2) ----
# In-memory means the DB is recreated every restart — fine for a demo.
spring.datasource.url=jdbc:h2:mem:library
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- JPA / Hibernate ----
# create-drop: schema is regenerated from @Entity classes on every boot,
# then data.sql below seeds initial rows.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ---- H2 web console (optional, handy in the demo video) ----
# Visit http://localhost:8081/h2-console — JDBC URL: jdbc:h2:mem:library
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf: disable cache so template edits show without restart. ----
spring.thymeleaf.cache=false
